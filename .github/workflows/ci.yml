name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:

jobs:
  club-system:
    name: club-system (typecheck + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/club-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/club-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
